<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Tempo</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://quiztempo.com/go/" />
  <!--
    Vanity door for the @quiztempo.fr Instagram bio. Instagram only shows a link's
    title when the profile carries several links, so a single link always renders
    its raw URL — hence a short path instead of /go/?src=ig_fr. Short enough to be
    typed by hand too, which is the only option on TikTok until 1,000 followers.

    /go does the platform detection and the click tracking; this page only carries
    the src through. Reusing this URL somewhere other than the FR Instagram bio
    would file those clicks under ig_fr.
  -->
  <meta http-equiv="refresh" content="0; url=../go/?src=ig_fr" />
  <script>window.location.replace('../go/?src=ig_fr');</script>
  <link rel="icon" href="../assets/favicon.ico" sizes="32x32" />
</head>
<body>
  <p><a href="../go/?src=ig_fr">Continuer vers le téléchargement de Quiz Tempo</a></p>
</body>
</html>
