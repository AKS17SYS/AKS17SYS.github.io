<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Tempo — Suivi des clics</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#081833" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a1020" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="../assets/favicon.ico" sizes="32x32" />
  <style>
    :root {
      --bg: #f4f8ff; --ink: #0f1a2e; --muted: #52607a; --surface: #ffffff;
      --line: #d6e2ff; --primary: #0f7bff; --accent: #007969; --bar: #0f7bff33;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a1020; --ink: #e9eefb; --muted: #9fadc9; --surface: #131b30;
        --line: #2a3654; --primary: #4d9bff; --accent: #2fd9bf; --bar: #4d9bff33;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: min(720px, 94vw); margin: 0 auto; padding: 24px 0 60px; }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    h1 { font-size: 1.25rem; margin: 0; }
    .sub { color: var(--muted); font-size: 0.82rem; }
    .eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; font-weight: 800; color: var(--accent); margin: 26px 0 10px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center; }
    .kpi b { display: block; font-size: 1.7rem; font-variant-numeric: tabular-nums; }
    .kpi span { color: var(--muted); font-size: 0.78rem; }
    .row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid var(--line); }
    .row:first-child { border-top: 0; }
    .row .name { flex: 1; min-width: 0; }
    .row .name b { font-weight: 600; }
    .row .name small { display: block; color: var(--muted); font-size: 0.76rem; }
    .row .n { font-size: 1.15rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .split { color: var(--muted); font-size: 0.74rem; margin-top: 2px; }
    .barrow { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.8rem; }
    .barrow .d { color: var(--muted); width: 66px; flex: none; font-variant-numeric: tabular-nums; }
    .barrow .track { flex: 1; background: var(--bar); border-radius: 5px; height: 16px; position: relative; overflow: hidden; }
    .barrow .fill { position: absolute; inset: 0 auto 0 0; background: var(--primary); border-radius: 5px; }
    .barrow .v { width: 34px; flex: none; text-align: right; font-variant-numeric: tabular-nums; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
    button, select, input {
      font: inherit; color: var(--ink); background: var(--surface);
      border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px;
    }
    button { cursor: pointer; font-weight: 600; }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .gate { max-width: 380px; margin: 12vh auto 0; text-align: center; }
    .gate input { width: 100%; margin: 14px 0; text-align: center; }
    .empty, .err { color: var(--muted); padding: 18px 0; text-align: center; }
    .err { color: #d64545; }
    a.forget { color: var(--muted); font-size: 0.78rem; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Token gate -->
    <div id="gate" class="gate" hidden>
      <h1>Suivi des clics</h1>
      <p class="sub">Entrez la clé d'accès.</p>
      <input id="key" type="password" placeholder="Clé d'accès" autocomplete="off" />
      <button class="primary" id="enter" type="button">Voir les chiffres</button>
      <p id="gate-err" class="err" hidden>Clé refusée.</p>
    </div>

    <!-- Dashboard -->
    <div id="dash" hidden>
      <header>
        <div>
          <h1>Suivi des clics <span class="muted">/go</span></h1>
          <div class="sub" id="range-label"></div>
        </div>
        <div class="controls">
          <select id="days" aria-label="Période">
            <option value="7">7 jours</option>
            <option value="30" selected>30 jours</option>
            <option value="90">90 jours</option>
          </select>
          <button id="refresh" type="button">Actualiser</button>
        </div>
      </header>

      <div class="kpis" id="kpis"></div>

      <p class="eyebrow">Par compte social</p>
      <div class="card" id="social"></div>

      <p class="eyebrow">Par plateforme</p>
      <div class="card" id="platform"></div>

      <p class="eyebrow">Où en est le clic</p>
      <div class="card" id="outcome"></div>

      <p class="eyebrow">Depuis le site</p>
      <div class="card" id="site"></div>

      <p class="eyebrow">Par jour</p>
      <div class="card" id="trend"></div>

      <p style="margin-top:22px"><a class="forget" href="#" id="forget">Oublier la clé sur cet appareil</a></p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var ENDPOINT = 'https://europe-west1-quizgame-abeno17.cloudfunctions.net/getGoStatsV1';
    var KEY_STORE = 'qt_stats_key';

    // Friendly labels. The four social doors are the ones AK actually compares.
    var SOCIAL = {
      ig_fr:     { label: 'Instagram FR', sub: '@quiztempo.fr · /jouer' },
      ig_en:     { label: 'Instagram EN', sub: '@quiz.tempo · /play' },
      tiktok_fr: { label: 'TikTok FR',    sub: '@quiztempoapp.fr · /ttfr' },
      tiktok_en: { label: 'TikTok EN',    sub: '@quiztempoapp · /tt' }
    };
    var PLAT = { ios: 'iPhone', android: 'Android', desktop: 'Ordinateur', unknown: 'Inconnu' };
    var OUTCOME = {
      redirect: 'Envoyé vers un store (mobile)',
      choice: 'Écran de choix (desktop)',
      manual: 'Bouton store cliqué',
      prelaunch: 'Avant lancement',
      unknown: 'Inconnu'
    };

    var $ = function (id) { return document.getElementById(id); };
    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

    function siteLabel(src) {
      if (/^hero_/.test(src)) return { label: 'Bouton hero', sub: src.slice(5).toUpperCase() };
      if (/^nav_/.test(src)) return { label: 'Menu', sub: src.slice(4).toUpperCase() };
      if (/^theme_/.test(src)) return { label: 'Page thème', sub: src.replace(/^theme_/, '').replace(/_/g, ' ') };
      if (src === '404') return { label: 'Page 404', sub: '' };
      if (src === 'contact_thanks') return { label: 'Confirmation contact', sub: '' };
      if (src === 'direct') return { label: 'Direct / inconnu', sub: '' };
      return { label: src, sub: '' };
    }

    // Sum a map field across every day.
    function mergeSum(daily, field) {
      var out = {};
      daily.forEach(function (d) {
        var m = d[field] || {};
        Object.keys(m).forEach(function (k) { out[k] = (out[k] || 0) + (m[k] || 0); });
      });
      return out;
    }
    function total(daily) { return daily.reduce(function (s, d) { return s + (d.total || 0); }, 0); }

    // Per-account platform split, read from bySrcPlatform keys "src__platform".
    function platformSplit(srcPlat, src) {
      var out = [];
      ['ios', 'android', 'desktop'].forEach(function (p) {
        var n = srcPlat[src + '__' + p] || 0;
        if (n) out.push(PLAT[p] + ' ' + n);
      });
      return out.join(' · ');
    }

    function rowsHTML(entries, srcPlat) {
      if (!entries.length) return '<div class="empty">Aucun clic sur cette période.</div>';
      return entries.map(function (e) {
        var split = srcPlat ? platformSplit(srcPlat, e.src) : '';
        return '<div class="row"><div class="name"><b>' + esc(e.label) + '</b>' +
          (e.sub ? '<small>' + esc(e.sub) + '</small>' : '') +
          (split ? '<div class="split">' + esc(split) + '</div>' : '') +
          '</div><div class="n">' + e.n + '</div></div>';
      }).join('');
    }

    function render(data) {
      var daily = data.daily || [];
      var sumTotal = total(daily);
      var bySrc = mergeSum(daily, 'bySrc');
      var byPlat = mergeSum(daily, 'byPlatform');
      var byOut = mergeSum(daily, 'byOutcome');
      var srcPlat = mergeSum(daily, 'bySrcPlatform');

      // KPIs: total, today (last day in data), best account.
      var todayDoc = daily[daily.length - 1];
      var todayN = todayDoc ? (todayDoc.total || 0) : 0;
      var socialEntries = Object.keys(SOCIAL).map(function (s) {
        return { src: s, n: bySrc[s] || 0 }; });
      var best = socialEntries.slice().sort(function (a, b) { return b.n - a.n; })[0];
      var bestLabel = best && best.n > 0 ? SOCIAL[best.src].label : '—';

      $('range-label').textContent = daily.length
        ? (daily[0].day + ' → ' + daily[daily.length - 1].day) : 'aucune donnée';

      $('kpis').innerHTML =
        kpi(sumTotal, 'clics au total') +
        kpi(todayN, 'aujourd’hui') +
        kpi(bestLabel, 'meilleur compte', true);

      // Social — sorted, with platform split.
      $('social').innerHTML = rowsHTML(
        socialEntries.sort(function (a, b) { return b.n - a.n; })
          .map(function (e) { return { label: SOCIAL[e.src].label, sub: SOCIAL[e.src].sub, n: e.n, src: e.src }; }),
        srcPlat);

      // Platform.
      $('platform').innerHTML = rowsHTML(
        Object.keys(byPlat).map(function (p) { return { label: PLAT[p] || p, n: byPlat[p] }; })
          .sort(function (a, b) { return b.n - a.n; }));

      // Outcome.
      $('outcome').innerHTML = rowsHTML(
        Object.keys(byOut).map(function (o) { return { label: OUTCOME[o] || o, n: byOut[o] }; })
          .sort(function (a, b) { return b.n - a.n; }));

      // Site (everything not a social door).
      var siteEntries = Object.keys(bySrc)
        .filter(function (s) { return !SOCIAL[s]; })
        .map(function (s) { var l = siteLabel(s); return { label: l.label, sub: l.sub, n: bySrc[s] }; })
        .sort(function (a, b) { return b.n - a.n; });
      $('site').innerHTML = rowsHTML(siteEntries);

      // Trend — one bar per day.
      var max = Math.max(1, Math.max.apply(null, daily.map(function (d) { return d.total || 0; })));
      $('trend').innerHTML = daily.length ? daily.map(function (d) {
        var n = d.total || 0;
        return '<div class="barrow"><span class="d">' + esc(d.day.slice(5)) + '</span>' +
          '<span class="track"><span class="fill" style="width:' + (n / max * 100) + '%"></span></span>' +
          '<span class="v">' + n + '</span></div>';
      }).join('') : '<div class="empty">Aucune donnée.</div>';
    }

    function kpi(v, label, small) {
      return '<div class="kpi"><b' + (small ? ' style="font-size:1.05rem"' : '') + '>' +
        esc(v) + '</b><span>' + esc(label) + '</span></div>';
    }

    function load() {
      var key = localStorage.getItem(KEY_STORE);
      if (!key) return showGate();
      var days = $('days').value;
      $('kpis').innerHTML = '<div class="empty" style="grid-column:1/-1">Chargement…</div>';
      fetch(ENDPOINT + '?key=' + encodeURIComponent(key) + '&days=' + days)
        .then(function (r) {
          if (r.status === 401) { localStorage.removeItem(KEY_STORE); showGate(true); throw new Error('401'); }
          if (!r.ok) throw new Error('http ' + r.status);
          return r.json();
        })
        .then(render)
        .catch(function (e) {
          if (e.message === '401') return;
          $('kpis').innerHTML = '<div class="err" style="grid-column:1/-1">Erreur de chargement (' + esc(e.message) + ').</div>';
        });
    }

    function showGate(refused) {
      $('dash').hidden = true;
      $('gate').hidden = false;
      $('gate-err').hidden = !refused;
      $('key').focus();
    }
    function showDash() {
      $('gate').hidden = true;
      $('dash').hidden = false;
      load();
    }

    $('enter').addEventListener('click', function () {
      var v = $('key').value.trim();
      if (!v) return;
      localStorage.setItem(KEY_STORE, v);
      showDash();
    });
    $('key').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('enter').click(); });
    $('refresh').addEventListener('click', load);
    $('days').addEventListener('change', load);
    $('forget').addEventListener('click', function (e) {
      e.preventDefault(); localStorage.removeItem(KEY_STORE); showGate();
    });

    if (localStorage.getItem(KEY_STORE)) showDash(); else showGate();
  })();
  </script>
</body>
</html>
