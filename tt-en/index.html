<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Tempo</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://quiztempo.com/go/" />
  <!--
    Vanity door for the @quiztempoapp TikTok bio. TikTok has no clickable link
    below 1,000 followers (and going Business to unlock one would cost access to
    the trending sound library), so this URL gets typed by hand — which is why it
    is kept as short as possible.

    It exists so TikTok traffic does not land in ig_en. Sharing one door between
    two accounts would not lose TikTok's numbers, it would silently credit them
    to Instagram, and the marketing bandit optimises on those numbers.
  -->
  <meta http-equiv="refresh" content="0; url=../go/?src=tiktok_en" />
  <script>window.location.replace('../go/?src=tiktok_en');</script>
  <link rel="icon" href="../assets/favicon.ico" sizes="32x32" />
</head>
<body>
  <p><a href="../go/?src=tiktok_en">Continue to the Quiz Tempo download</a></p>
</body>
</html>
