<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Tempo</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://quiztempo.com/go/" />
  <!--
    Vanity door for the @quiztempoapp.fr TikTok bio. TikTok has no clickable link
    below 1,000 followers (and going Business to unlock one would cost access to
    the trending sound library), so this URL gets typed by hand — which is why it
    is the shortest path on the site.

    It exists so TikTok traffic does not land in ig_fr. Sharing one door between
    two accounts would not lose TikTok's numbers, it would silently credit them
    to Instagram, and the marketing bandit optimises on those numbers.
  -->
  <meta http-equiv="refresh" content="0; url=../go/?src=tiktok_fr" />
  <script>window.location.replace('../go/?src=tiktok_fr');</script>
  <link rel="icon" href="../assets/favicon.ico" sizes="32x32" />
</head>
<body>
  <p><a href="../go/?src=tiktok_fr">Continuer vers le téléchargement de Quiz Tempo</a></p>
</body>
</html>
